steps:
  # 1. Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/decoder-backend', '.']
  
  # 2. Push the image to Google Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/decoder-backend']

  # 3. Deploy container image to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'decoder-backend'
      - '--image'
      - 'gcr.io/$PROJECT_ID/decoder-backend'
      - '--region'
      - 'australia-southeast1'  # ⚠️ Make sure this matches your region
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'

# ⚠️ THIS IS THE MAGIC FIX FOR YOUR ERROR
options:
  logging: CLOUD_LOGGING_ONLY